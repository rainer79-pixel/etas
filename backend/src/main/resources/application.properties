spring.application.name=backend

# PostgreSQL
# P6Spy - settings
spring.datasource.url=jdbc:p6spy:postgresql://localhost/postgres
spring.datasource.driverClassName=com.p6spy.engine.spy.P6SpyDriver

# normal settings
#spring.datasource.driverClassName=org.postgresql.Driver
#spring.datasource.url=jdbc:postgresql://localhost/postgres
spring.datasource.username=postgres
spring.datasource.password=student123

# JPA
spring.jpa.show-sql=false
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.default_schema=etas

# SQL init — schema hallatakse käsitsi (database/2_create.sql)
spring.sql.init.mode=never
